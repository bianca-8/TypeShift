<!DOCTYPE html>
    <html>
        <head>
            <title>TypeShift</title>
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <link rel="stylesheet" href="styles.css" />
            <link
                href="https://fonts.googleapis.com/css?family=Happy+Monkey"
                rel="stylesheet"/>
            <script src="main.js" defer></script>
        </head>

        <body>
            <header>
                <h1>TypeShift</h1>
            </header>
            <main>
                <div class="info">
                    <p>A translator for when you type with your hands in the wrong position.</p>
                </div>
                <div class="dropdown">
                    <label for="shift-select">Shift:</label>
                    <select id="shift-select">
                        <option value="-6">-6</option>
                        <option value="-5">-5</option>
                        <option value="-4">-4</option>
                        <option value="-3">-3</option>
                        <option value="-2">-2</option>
                        <option value="-1">-1</option>
                        <option value="0" selected>0</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                    </select>
                </div>
                <div class="container">
                    <div class="box-container">
                        <textarea id="input-text" class="box" placeholder="Type here..."></textarea>
                        <div id="copy-input" class="copy-button">Copy</div>
                    </div>
                    <div class="box-container">
                        <div class="box" id="output-text">
                        </div>
                        <div id="copy-output" class="copy-button">Copy</div>
                    </div>
                </div>
                <div id="swap-button" class="swap">Encryption</div>
            </main>
            <footer>

            </footer>
        </body>
    </html>
</DOCTYPE>
